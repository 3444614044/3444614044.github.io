name: Auto Build and Upload

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'  # 每天早上8点自动构建

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Run tests
        run: |
          cd tests
          ./test_level1.sh
        
      - name: Build game
        run: |
          ./build.sh
        
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: git-escape-build
          path: git-escape*.tar.gz
        
      - name: Create release note
        run: |
          echo "自动构建完成于 $(date)"
          echo "版本: $(cat version.txt)"
          echo "关卡数: 1"
          echo "文件大小: $(du -h git-escape*.tar.gz | cut -f1)"
          echo "下载链接: https://github.com/${{ github.repository }}/releases/download/auto-build/git-escape.tar.gz"